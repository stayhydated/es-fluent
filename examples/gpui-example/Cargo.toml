[package]
name = "gpui-example"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
license = "Unlicense"
publish = false
autobins = false

[[example]]
name = "gpui-example"
path = "src/main.rs"

[dependencies]
es-fluent = { workspace = true }
es-fluent-manager-embedded = { workspace = true }
example-shared-lib = { features = [ "gpui" ], path = "../example-shared-lib" }
gpui = { workspace = true }
gpui-component = { workspace = true }
gpui_platform = { workspace = true }
tracing-subscriber = { features = [ "env-filter" ], workspace = true }
wasm-bindgen = { workspace = true }

[lib]
crate-type = [ "cdylib", "rlib" ]

[build-dependencies]
es-fluent-build = { workspace = true }

[lints]
workspace = true
