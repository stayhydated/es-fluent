<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>es-fluent Bevy demo</title>
    <base data-trunk-public-url />
    <link data-trunk rel="copy-dir" href="../assets" data-target-path="assets" />
    <link
      data-trunk
      rel="rust"
      data-bin="bevy-example"
      data-initializer="../wasm-demo-loader/trunk-loader.js"
      data-wasm-demo-name="Bevy"
      data-wasm-demo-description="Launching the localized Bevy example with Trunk-managed assets."
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(74, 142, 255, 0.26), transparent 50%),
          linear-gradient(180deg, #0a1420 0%, #050b14 100%);
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100vw !important;
        height: 100vh !important;
        display: block;
      }
    </style>
  </head>
  <body></body>
</html>
