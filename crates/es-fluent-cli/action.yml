name: es-fluent-cli
description: Run es-fluent check in CI.
inputs:
  version:
    description: "Optional es-fluent-cli version to install from crates.io. When omitted, the CLI is installed from the pinned action ref."
    required: false
    default: ""
  path:
    description: Path to the crate or workspace root (passed as --path).
    required: false
    default: .
  package:
    description: Optional package name to filter workspace crates (passed as --package).
    required: false
    default: ""
  all:
    description: Check all locales, not just the fallback language.
    required: false
    default: "false"
  ignore:
    description: "Crates to skip (comma-separated), passed as --ignore."
    required: false
    default: ""
  force_run:
    description: Run the generated runner through Cargo, ignoring the staleness cache.
    required: false
    default: "false"
  toolchain:
    description: Rust toolchain to install for running the CLI.
    required: false
    default: stable

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.toolchain }}

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.10

    - name: Install es-fluent-cli
      shell: bash
      run: |
        set -euo pipefail
        version="${{ inputs.version }}"
        if [[ -z "$version" ]]; then
          cargo install --path "${GITHUB_ACTION_PATH}" --locked
        elif [[ "$version" == "latest" ]]; then
          cargo install es-fluent-cli --locked
        else
          cargo install es-fluent-cli --locked --version "$version"
        fi

    - name: Run es-fluent
      shell: bash
      run: |
        set -euo pipefail
        args=()
        if [[ -n "${{ inputs.path }}" ]]; then
          args+=(--path "${{ inputs.path }}")
        fi
        if [[ -n "${{ inputs.package }}" ]]; then
          args+=(--package "${{ inputs.package }}")
        fi
        if [[ "${{ inputs.all }}" == "true" ]]; then
          args+=(--all)
        fi
        if [[ -n "${{ inputs.ignore }}" ]]; then
          ignore_value=$(echo "${{ inputs.ignore }}" | tr '\n' ',' | sed 's/,*$//' | sed 's/^,*//')
          args+=(--ignore "$ignore_value")
        fi
        if [[ "${{ inputs.force_run }}" == "true" ]]; then
          args+=(--force-run)
        fi

        cargo es-fluent check "${args[@]}"
