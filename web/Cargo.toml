[package]
name = "web"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
license = "Unlicense"
publish = false

[features]
default = []
web = [
  "dep:dioxus",
  "dep:web-sys",
  "dioxus/launch",
  "dioxus/web",
  "es-fluent-manager-dioxus/web",
]

[dependencies]
anyhow = { workspace = true }
dioxus = { workspace = true, optional = true }
dioxus-core = { workspace = true }
dioxus-core-macro = { workspace = true }
dioxus-html = { workspace = true }
dioxus-signals = { workspace = true }
dioxus-ssr = { workspace = true }
es-fluent = { features = ["derive"], workspace = true }
es-fluent-manager-dioxus = { features = ["macros", "ssr"], workspace = true }
rust-embed = { workspace = true, features = ["debug-embed"] }
unic-langid = { workspace = true }
walkdir = { workspace = true }
web-sys = { workspace = true, features = ["Location", "Window"], optional = true }

[build-dependencies]
es-fluent = { features = ["build"], workspace = true }

[dev-dependencies]
serial_test = { workspace = true }

[lints]
workspace = true
