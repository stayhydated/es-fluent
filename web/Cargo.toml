[package]
name = "web"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
license = "Unlicense"
publish = false

[features]
default = [  ]
web = [ "dioxus/web", "dep:web-sys" ]

[dependencies]
anyhow = { workspace = true }
dioxus = { features = [ "router", "launch", "lib" ], workspace = true }
dioxus-core = { workspace = true }
dioxus-core-macro = { workspace = true }
dioxus-html = { workspace = true }
dioxus-signals = { workspace = true }
es-fluent = { features = [ "derive" ], workspace = true }
es-fluent-lang = { features = [ "localized-langs" ], workspace = true }
es-fluent-manager-dioxus = { features = [ "macros", "ssr", "web" ], workspace = true }
rust-embed = { features = [ "debug-embed" ], workspace = true }
strum = { features = [ "derive" ], workspace = true }
unic-langid = { workspace = true }
walkdir = { workspace = true }
web-sys = { features = [ "Location", "Window" ], optional = true, workspace = true }

[build-dependencies]
es-fluent = { features = [ "build" ], workspace = true }

[dev-dependencies]
serial_test = { workspace = true }

[lints]
workspace = true
