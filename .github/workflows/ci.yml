name: ci

on:
  pull_request:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  es-fluent-local-cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Run local es-fluent-cli check
        run: cargo es-fluent-local check --path . --all

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Run tests
        run: cargo test --workspace --all-features

  fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Lint code
        run: cargo clippy --workspace --all-features

  machete:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Machete
        uses: bnjbvr/cargo-machete@main

  rust-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Install cargo-llvm-cov
        shell: bash
        run: |
          if ! command -v cargo-llvm-cov &> /dev/null; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Run coverage
        shell: bash
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --all-features --cobertura --output-path=target/cobertura.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cobertura
          path: target/cobertura.xml
          if-no-files-found: error

  codecov-publish:
    runs-on: ubuntu-latest
    needs: rust-coverage

    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-cobertura
          path: target

      - name: Codecov publish
        uses: codecov/codecov-action@v5
        with:
          files: target/cobertura.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Codecov housekeeping
        shell: bash
        run: |
          rm -f codecov codecov.SHA256SUM codecov.SHA256SUM.sig
