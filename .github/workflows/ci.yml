name: ci

on:
  pull_request:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  es-fluent-local-cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Run local es-fluent-cli check
        run: cargo es-fluent-local check --path . --all

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup mold
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-deps

      - name: Run tests
        run: cargo test --workspace --all-features

  dioxus-manager-feature-matrix:
    name: dioxus manager (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-features
            command: cargo check -p es-fluent-manager-dioxus --no-default-features
          - name: client-test
            command: cargo test -p es-fluent-manager-dioxus --no-default-features --features client
          - name: ssr-test
            command: cargo test -p es-fluent-manager-dioxus --no-default-features --features ssr
          - name: client-wasm-check
            command: cargo check -p es-fluent-manager-dioxus --target wasm32-unknown-unknown --no-default-features --features client

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Run check
        run: ${{ matrix.command }}

  fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Lint code
        run: cargo clippy --workspace --all-features

  machete:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Machete
        uses: bnjbvr/cargo-machete@main

  rust-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Install cargo-llvm-cov
        shell: bash
        run: |
          if ! command -v cargo-llvm-cov &> /dev/null; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Run coverage
        shell: bash
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --all-features --cobertura --output-path=target/cobertura.xml --exclude xtask --exclude web

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cobertura
          path: target/cobertura.xml
          if-no-files-found: error

  codecov-publish:
    runs-on: ubuntu-latest
    needs: rust-coverage

    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-cobertura
          path: target

      - name: Codecov publish
        uses: codecov/codecov-action@v6
        with:
          files: target/cobertura.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Codecov housekeeping
        shell: bash
        run: |
          rm -f codecov codecov.SHA256SUM codecov.SHA256SUM.sig
