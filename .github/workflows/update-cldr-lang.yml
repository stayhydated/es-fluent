name: Refresh ICU4X Language Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 1 * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-icu4x-lang
  cancel-in-progress: false

jobs:
  refresh-icu4x-lang:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Regenerate language data with xtask
        run: cargo run -p xtask -- generate-lang-names

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/icu4x-lang-refresh
          commit-message: "chore(i18n): refresh ICU4X language data"
          title: "chore(i18n): refresh ICU4X language data"
          body: |
            Automated refresh of `es-fluent-lang` language resources generated by:
            - `cargo run -p xtask -- generate-lang-names`
            - ICU4X baked data from workspace dependencies
          labels: |
            dependencies
            i18n
          delete-branch: true
          add-paths: |
            Cargo.toml
            Cargo.lock
            xtask
            crates/es-fluent-lang/es-fluent-lang.ftl
            crates/es-fluent-lang/i18n
            crates/es-fluent-lang-macro/src/supported_locales.rs
