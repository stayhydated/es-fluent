name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TRUNK_VERSION: "0.21.14"
      DIOXUS_CLI_VERSION: "0.7.9"
      TRUNK_SKIP_VERSION_CHECK: "true"
    steps:
      - uses: actions/checkout@v7

      - uses: mozilla-actions/sccache-action@v0.0.10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install nightly toolchain for GPUI demo
        run: |
          rustup toolchain install nightly --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain nightly

      - uses: cargo-bins/cargo-binstall@main

      - name: Install build tools
        run: |
          cargo binstall trunk --version "$TRUNK_VERSION" --no-confirm
          cargo binstall dioxus-cli --version "$DIOXUS_CLI_VERSION" --no-confirm
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Build web site
        run: |
          env -u RUSTC_WRAPPER cargo xtask build bevy-demo
          env -u RUSTC_WRAPPER cargo xtask build gpui-demo
          cargo xtask build book
          cargo xtask build llms-txt
          cargo xtask build web

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
